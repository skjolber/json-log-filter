name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]
    paths:
      - 'webapp/teavm/**'
      - 'api/**'
      - 'base/**'
      - 'impl/core/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Build
        run: mvn install -P webapp --no-transfer-progress -DskipTests

      - name: Stage Pages site (static files only, no WEB-INF)
        run: |
          mkdir -p target/pages
          cp webapp/teavm/target/webapp/index.html target/pages/
          cp -r webapp/teavm/target/webapp/js       target/pages/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: target/pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
